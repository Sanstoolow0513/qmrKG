# QmrKG task configuration
# Keep sensitive credentials such as PPIO_API_KEY in .env.

llm:
  profiles:
    qwen3-vl-8b:
      provider:
        name: ppio
        base_url: "https://api.ppinfra.com/openai"
        model: "qwen/qwen3-vl-8b-instruct"
        modality: "multimodal"
        supports_thinking: false
      request:
        image_detail: "high"
        timeout_seconds: 60.0
        max_retries: 3
        thinking:
          enabled: false
      rate_limit:
        rpm: 100
        max_concurrency: 10
    deepseek-v3.2:
      provider:
        name: ppio
        base_url: "https://api.ppinfra.com/openai"
        model: "deepseek/deepseek-v3.2"
        modality: "text"
        supports_thinking: false
      request:
        timeout_seconds: 60.0
        max_retries: 3
        thinking:
          enabled: false
      rate_limit:
        rpm: 50
        max_concurrency: 4
    embedding_qwen3_8b:
      provider:
        name: ppio
        base_url: "https://api.ppinfra.com/openai"
        model: "qwen/qwen3-embedding-8b"
        modality: "embedding"
        supports_thinking: false
      request:
        timeout_seconds: 60.0
        max_retries: 3
        encoding_format: "float"
        dimensions: 1024
      rate_limit:
        rpm: 3000
        max_concurrency: 300
    deepseek_v4_flash:
      provider:
        name: ppio
        base_url: "https://api.ppinfra.com/v3/openai"
        model: "deepseek/deepseek-v4-flash"
        modality: "text"
        supports_thinking: true
      request:
        timeout_seconds: 60.0
        max_retries: 3
        thinking:
          enabled: true
      rate_limit:
        rpm: 3000
        max_concurrency: 900

ocr:
  llm_profile: qwen3-vl-8b
  prompt_key: default

  prompts:
    default: |
      你是一个 OCR 文字识别系统。

      输出要求：
      - 输出必须是有效的 Markdown。
      - 输出语言必须与图片语言一致（中文图片就输出中文）。
      - 尽可能保留阅读顺序与换行。
      - 不要翻译或改写文字：识别到什么就输出什么（保持原样）。
      - 对“看起来像标题/章节名”的行，尽量输出 Markdown 标题（优先加 `#`，不要把标题当普通段落丢掉）。

      标题识别与格式（非常重要）：
      - 当一行很可能是标题/章节名时，把它输出为 Markdown 标题：
        使用 `#`、`##` 或 `###` 作为前缀。
      - 标题行格式必须严格为：`# <标题内容>`（`## <...>`、`### <...>` 同理）。
        `#` 后面必须紧跟一个空格；不要输出 `#` 后面没有空格的形式。
      - 标题必须占据自己的行/行组：不要在句子中间插入 `#`。
      - 标题层级选择规则（按证据强弱）：
        - 不确定时：也要用 `#`（顶层），不要省略标题标记。
        - 更像二级标题时：用 `##`（例如“第 X 节”、`X.Y`、以 `1.` 开头且后面跟较短标题）。
        - 更像三级/更小单元时：用 `###`（例如“第 X 条”、“（一）（二）”、`2.1`、`1)`）。

      中文标题识别偏好（你的输入主要是中文）：
      - 当行中包含常见中文结构关键词或典型编号样式时，把它当标题：
        `第X章`、`第X节`、`第X条`、`第X款`、`第X项`、`章`、`节`、`条`、`款`、`小节`、`附录`、`附件`、
        `前言`、`目录`、`参考文献`、`致谢`、`结论`。
      - 或者当它符合编号模式时：`1. ...`、`1) ...`、`1）...`、`（一）...`、`（1）...`、`一、...`。
      - 另外：如果该行在版面上很像标题（上下有明显留白、居中、加粗、字体更大），也应输出为标题。
      - 如果该行看起来更像“标题而不是句子”（例如短、末尾不像句子那样带 `。` 等标点，或包含明确章节词），优先转换为标题。

      文字版 Few-shot（演示如何加标题标记）：
      - 输入行：`第一章 绪论`
        输出：`# 第一章 绪论`
      - 输入行：`2.1 相关工作`
        输出：`## 2.1 相关工作`
      - 输入行：`第十条 义务`
        输出：`### 第十条 义务`
      - 输入行：`（一）定义`
        输出：`### （一）定义`

      对于图标、符号、图表或其他非文字视觉元素：
      用围栏代码块描述，例如 ```icon: description```。

      不要在转录内容之外添加任何评论或总结。

extract:
  llm_profile: deepseek_v4_flash
  prompts:
    zs: |
      你是一个计算机网络课程知识图谱构建专家。

      任务：从给定的教材文本中，识别命名实体并抽取实体间的关系，生成知识三元组。

      ## 实体类型（4类）
      - protocol: 协议名称（如 TCP、HTTP、DNS、ARP）
      - concept: 概念术语（如 拥塞控制、子网掩码、路由表）
      - mechanism: 机制算法（如 三次握手、慢启动算法、CSMA/CD）
      - metric: 性能指标（如 吞吐量、RTT、丢包率、带宽）

      ## 关系类型（4类）
      - contains: 包含关系（A 包含 B）
      - depends_on: 依赖关系（A 依赖 B）
      - compared_with: 对比关系（A 与 B 对比）
      - applied_to: 应用关系（A 应用于 B）

      ## 输出格式
      严格输出 JSON，不要输出任何其他内容：
      {
        "entities": [
          {"name": "TCP", "type": "protocol", "description": "传输控制协议"}
        ],
        "triples": [
          {"head": "TCP", "relation": "compared_with", "tail": "UDP", "evidence": "原文依据"}
        ]
      }

      ## 规则
      1. 只从给定文本中抽取，不要编造
      2. entity.name 使用文本中出现的原始名称
      3. 每个 triple 必须附带 evidence（原文中支持该关系的关键句）
      4. 如果文本中没有可抽取的实体或关系，返回空列表

    # Few-shot：多示例联合抽取（覆盖 4 类关系，含负面与粒度规则）
    fs: |
      你是计算机网络知识图谱联合抽取专家。先学习示例中的标注风格，再对新的教材片段独立抽取。
      注意：示例仅用于学习格式与标准，不是待抽取语料。

      ## 固定 schema
      - 实体类型仅允许：protocol、concept、mechanism、metric
      - 关系类型仅允许：contains、depends_on、compared_with、applied_to

      ## Few-shot 示例（覆盖 4 种关系）
      ### 示例 1：compared_with
      输入教材片段：
      「与 UDP 相比，TCP 提供可靠传输；UDP 不保证按序到达。」
      期望 JSON：
      {
        "entities": [
          {"name": "TCP", "type": "protocol", "description": "可靠传输协议"},
          {"name": "UDP", "type": "protocol", "description": "无连接传输协议"}
        ],
        "triples": [
          {"head": "TCP", "relation": "compared_with", "tail": "UDP", "evidence": "与 UDP 相比，TCP 提供可靠传输"}
        ]
      }

      ### 示例 2：contains
      输入教材片段：
      「OSI 参考模型包含物理层、数据链路层、网络层、传输层、会话层、表示层和应用层。」
      期望 JSON：
      {
        "entities": [
          {"name": "OSI 参考模型", "type": "concept", "description": "网络体系结构分层模型"},
          {"name": "物理层", "type": "concept", "description": "OSI 第一层"},
          {"name": "数据链路层", "type": "concept", "description": "OSI 第二层"},
          {"name": "网络层", "type": "concept", "description": "OSI 第三层"},
          {"name": "传输层", "type": "concept", "description": "OSI 第四层"},
          {"name": "会话层", "type": "concept", "description": "OSI 第五层"},
          {"name": "表示层", "type": "concept", "description": "OSI 第六层"},
          {"name": "应用层", "type": "concept", "description": "OSI 第七层"}
        ],
        "triples": [
          {"head": "OSI 参考模型", "relation": "contains", "tail": "物理层", "evidence": "OSI 参考模型包含物理层"},
          {"head": "OSI 参考模型", "relation": "contains", "tail": "数据链路层", "evidence": "OSI 参考模型包含物理层、数据链路层"},
          {"head": "OSI 参考模型", "relation": "contains", "tail": "网络层", "evidence": "OSI 参考模型包含物理层、数据链路层、网络层"},
          {"head": "OSI 参考模型", "relation": "contains", "tail": "传输层", "evidence": "OSI 参考模型包含物理层、数据链路层、网络层、传输层"},
          {"head": "OSI 参考模型", "relation": "contains", "tail": "会话层", "evidence": "OSI 参考模型包含物理层、数据链路层、网络层、传输层、会话层"},
          {"head": "OSI 参考模型", "relation": "contains", "tail": "表示层", "evidence": "OSI 参考模型包含物理层、数据链路层、网络层、传输层、会话层、表示层"},
          {"head": "OSI 参考模型", "relation": "contains", "tail": "应用层", "evidence": "OSI 参考模型包含物理层、数据链路层、网络层、传输层、会话层、表示层和应用层"}
        ]
      }

      ### 示例 3：depends_on
      输入教材片段：
      「TCP 的可靠传输依赖确认应答机制与重传机制来保证数据正确送达。」
      期望 JSON：
      {
        "entities": [
          {"name": "TCP", "type": "protocol", "description": "传输控制协议"},
          {"name": "可靠传输", "type": "concept", "description": "保证数据正确有序送达的能力"},
          {"name": "确认应答机制", "type": "mechanism", "description": "通过 ACK 确认接收状态"},
          {"name": "重传机制", "type": "mechanism", "description": "丢失或超时后重新发送数据"}
        ],
        "triples": [
          {"head": "可靠传输", "relation": "depends_on", "tail": "确认应答机制", "evidence": "TCP 的可靠传输依赖确认应答机制"},
          {"head": "可靠传输", "relation": "depends_on", "tail": "重传机制", "evidence": "TCP 的可靠传输依赖确认应答机制与重传机制"},
          {"head": "TCP", "relation": "depends_on", "tail": "确认应答机制", "evidence": "TCP 的可靠传输依赖确认应答机制"},
          {"head": "TCP", "relation": "depends_on", "tail": "重传机制", "evidence": "TCP 的可靠传输依赖确认应答机制与重传机制"}
        ]
      }

      ### 示例 4：applied_to
      输入教材片段：
      「慢启动算法应用于 TCP 拥塞控制过程，在连接初期逐步增大发送窗口。」
      期望 JSON：
      {
        "entities": [
          {"name": "慢启动算法", "type": "mechanism", "description": "拥塞窗口逐步增长机制"},
          {"name": "TCP", "type": "protocol", "description": "传输控制协议"},
          {"name": "拥塞控制", "type": "concept", "description": "控制网络拥塞的策略"}
        ],
        "triples": [
          {"head": "慢启动算法", "relation": "applied_to", "tail": "TCP", "evidence": "慢启动算法应用于 TCP 拥塞控制过程"},
          {"head": "慢启动算法", "relation": "applied_to", "tail": "拥塞控制", "evidence": "慢启动算法应用于 TCP 拥塞控制过程"}
        ]
      }

      ## 负面示例（什么不该抽）
      - 不抽过泛词：如“计算机”“网络”“系统”“课程”“章节”等泛化背景词。
      - 不抽结构导航词：如“本章”“如下图所示”“第 3 节”等版式导航信息。
      - 不抽未在原文出现的术语或缩写扩展，不做常识补全。

      ## 粒度规则
      - 优先拆分“协议 + 概念/机制”复合短语：
        - 例如“TCP 拥塞控制”优先拆为 `TCP`（protocol）与 `拥塞控制`（concept）。
      - 仅当整体在原文被明确当作稳定术语使用时，才保留整体实体。
      - 含“算法/机制/流程/过程/握手”等词，优先标注为 mechanism；
        抽象能力或性质（如“可靠传输”“流量控制”）优先标注为 concept。

      ## evidence 规则（必须遵守）
      - evidence 必须是输入文本中的连续原文子串，禁止改写、拼接、补词。
      - evidence 优先使用完整分句；若句子过长，可截取最短可证明关系的连续片段。
      - evidence 必须能同时支撑 head、relation、tail 的判定。

      ## 新任务
      对接下来用户消息中的教材文本执行抽取，输出严格 JSON，不要输出任何其他内容：
      {
        "entities": [
          {"name": "...", "type": "protocol|concept|mechanism|metric", "description": "..."}
        ],
        "triples": [
          {"head": "...", "relation": "contains|depends_on|compared_with|applied_to", "tail": "...", "evidence": "..."}
        ]
      }

    review: |
      你是知识图谱三元组审核器。你的任务是审核候选 triples，并输出“可直接入库前”的修正结果。

      ## 输入说明
      你会收到一个 JSON 对象：
      {
        "chunk": "原始教材文本",
        "triples": [
          {"head": "...", "relation": "...", "tail": "...", "evidence": "..."}
        ]
      }

      ## 审核标准（必须严格执行）
      1. relation 只能是：contains / depends_on / compared_with / applied_to
      2. evidence 必须是 chunk 中的连续原文子串（逐字一致），不能改写、拼接、补词
      3. head 与 tail 都必须出现在 evidence 中
      4. 若 triple 不满足任一条件，必须 decision=drop
      5. 严禁引入 chunk 中不存在的新实体、新关系或新证据
      6. 不要计算字符级位置；evidence_span 固定输出 null

      ## decision 规则
      - keep: 完全满足标准，可直接保留
      - revise: 仅当你能通过“最小修改 evidence 或字段”使其满足标准时使用
      - drop: 无法满足标准或证据不足

      ## reason_code 约束
      仅可使用以下枚举：
      SUPPORTED
      EVIDENCE_NOT_IN_CHUNK
      SPAN_MISMATCH
      HEAD_NOT_IN_EVIDENCE
      TAIL_NOT_IN_EVIDENCE
      INVALID_RELATION
      SELF_LOOP
      LOW_CONFIDENCE_DROP

      ## 输出要求
      - 只输出严格 JSON，不要输出解释文字
      - 顶层仅包含一个键：triples
      - 每个 triple 必须包含 review 对象

      输出格式：
      {
        "triples": [
          {
            "head": "...",
            "relation": "contains|depends_on|compared_with|applied_to",
            "tail": "...",
            "evidence": "...",
            "evidence_span": null,
            "review": {
              "decision": "keep|revise|drop",
              "reason_code": "SUPPORTED|EVIDENCE_NOT_IN_CHUNK|SPAN_MISMATCH|HEAD_NOT_IN_EVIDENCE|TAIL_NOT_IN_EVIDENCE|INVALID_RELATION|SELF_LOOP|LOW_CONFIDENCE_DROP",
              "reason": "简短中文原因"
            }
          }
        ]
      }

entity_embed:
  llm_profile: embedding_qwen3_8b

entity_merge_review:
  llm_profile: deepseek_v4_flash
  prompt_key: default
  prompts:
    default: |
      你是计算机网络知识图谱的实体归一化复核器。

      判断两个候选 term 是否指向同一个实体。不要输出置信度。
      只能根据用户消息中的 descriptions/triples 证据判断，并且只能引用给定 evidence id。
      如果上下文标记 truncated=true，说明仍有未展示的三元组；除非证据极强，否则应输出 unsure。

      决策标准：
      - merge：两个 term 在三元组中可互换，合并后语义不变。
      - keep_separate：二者相关但不是同一实体，或存在对比、包含、依赖、应用等反证。
      - unsure：证据不足，不能安全合并。

      输出必须是严格 JSON，不要输出 Markdown 或解释文字：
      {
        "decision": "merge|keep_separate|unsure",
        "canonical_name": "只能是候选 term 之一，不能合并时为 null",
        "reason_code": "短原因码",
        "reason": "简短中文原因",
        "supporting_evidence_ids": ["支持 merge 的证据 id"],
        "conflict_evidence_ids": ["支持 keep_separate 的证据 id"]
      }

run:
  qmr:
    from_stage: null
    to_stage: null
    no_neo4j: false

  pdf_to_png:
    input_file: null
    pdf_dir: "data/pdf"
    image_dir: "data/png"
    dpi: 200
    recursive: false
    libreoffice: "libreoffice"
    ppt_timeout: 300

  png_to_text:
    input_file: null
    output: null
    image_dir: "data/png"
    text_dir: "data/markdown"
    recursive: true
    lang: "ch"
    gpu: false
    force_ocr: false

  md_chunk:
    input_file: null
    output: null
    markdown_dir: "data/markdown"
    chunk_dir: "data/chunks"
    max_tokens: 4000
    recursive: false

  kg_md_combine:
    markdown_dir: "data/markdown"
    # 每本书子目录下参与合并的 per-page 文件通配（相对该书目录）
    page_glob: "*_page_*.md"

  kg_extract:
    input: "data/chunks"
    output_dir: null
    mode: "fs"
    no_skip: false
    review: false
    strict_evidence: true
    keep_dropped: true
    extractor_version: "kgextract_v2"

  kg_merge:
    input_dir: "data/triples/raw-fs"
    output: "data/triples/merged/merged_triples.json"
    embedding:
      enabled: true
      task_name: "entity_embed"
      encoding_template: "structured_zh"
      encode_fields: ["type", "name", "description"]
      max_desc_chars: 160
      candidate_threshold: 0.78
      similarity_threshold: 0.85
      direct_merge_without_recheck: false
      bucket_by_type: true
      faiss_top_k: 50
      batch_size: 1024
      cache_format: "binary"
      cache_path: "data/triples/merged/.embed_cache.json"
      llm_recheck:
        enabled: true
        task_name: "entity_merge_review"
        max_pairs: 200
        context_triples_per_entity: 8
        require_supporting_evidence: true
        allow_merge_with_truncated_context: false
        max_cluster_size: 4
        require_complete_pairwise_cluster: true

  kg_neo4j:
    import_file: "data/triples/merged/merged_triples.json"
    uri: "bolt://localhost:7687"
    user: "neo4j"
    clear: false
    stats: false

  kg_eval:
    pred: "data/triples/merged/merged_triples.json"
    gold: null
    output_json: null
    output_md: null
    top_errors: 10
